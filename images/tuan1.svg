<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2b8a"/>
      <stop offset="100%" style="stop-color:#1a6cff"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d9fff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1a6cff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg1)"/>

  <!-- Grid lines -->
  <line x1="0" y1="60" x2="600" y2="60" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Glow blob -->
  <ellipse cx="420" cy="160" rx="160" ry="120" fill="url(#glow1)" filter="url(#blur1)"/>

  <!-- Folder icon (big) -->
  <!-- Folder back -->
  <path d="M310 100 Q310 88 322 88 L380 88 Q386 88 390 94 L398 106 L490 106 Q502 106 502 118 L502 210 Q502 222 490 222 L310 222 Q298 222 298 210 L298 112 Q298 100 310 100Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Folder front highlight -->
  <path d="M298 130 L502 130 L502 210 Q502 222 490 222 L310 222 Q298 222 298 210Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Folder tab -->
  <path d="M322 88 L362 88 L370 100 L310 100 Q310 88 322 88Z" fill="rgba(100,180,255,0.35)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Files inside folder -->
  <rect x="330" y="148" width="44" height="54" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="384" y="148" width="44" height="54" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="438" y="148" width="44" height="54" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Lines on files -->
  <line x1="338" y1="162" x2="366" y2="162" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="338" y1="171" x2="366" y2="171" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="338" y1="180" x2="355" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Terminal / cmd icon left side -->
  <rect x="80" y="90" width="170" height="110" rx="10" fill="rgba(0,0,0,0.35)" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <!-- terminal header dots -->
  <circle cx="100" cy="107" r="5" fill="#ff5f57"/>
  <circle cx="116" cy="107" r="5" fill="#febc2e"/>
  <circle cx="132" cy="107" r="5" fill="#28c840"/>
  <line x1="80" y1="118" x2="250" y2="118" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <!-- terminal text -->
  <text x="96" y="136" font-family="monospace" font-size="11" fill="rgba(100,255,180,0.9)">$ mkdir project/</text>
  <text x="96" y="153" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">$ cd project/</text>
  <text x="96" y="170" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">$ ls -la</text>
  <text x="96" y="187" font-family="monospace" font-size="11" fill="rgba(100,200,255,0.8)">drwxr-xr-x  4 user</text>

  <!-- Label -->
  <text x="30" y="268" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">TUẦN 01</text>
  <text x="30" y="288" font-family="'DM Sans', Arial, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="1">Thao tác cơ bản với thư mục</text>
</svg>
