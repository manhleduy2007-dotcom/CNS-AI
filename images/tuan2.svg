<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f6b"/>
      <stop offset="100%" style="stop-color:#1259d4"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60b0ff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#0040cc;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="600" height="300" fill="url(#bg2)"/>

  <!-- Dot matrix pattern -->
  <pattern id="dots2" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="600" height="300" fill="url(#dots2)"/>

  <!-- Glow blob -->
  <ellipse cx="200" cy="140" rx="180" ry="130" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Search bar -->
  <rect x="60" y="80" width="280" height="42" rx="21" fill="rgba(255,255,255,0.12)" stroke="rgba(100,180,255,0.5)" stroke-width="1.5"/>
  <circle cx="318" cy="101" r="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="325" y1="108" x2="335" y2="118" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  <text x="88" y="107" font-family="'DM Sans', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">Tìm kiếm học thuật...</text>
  <!-- Cursor blink -->
  <rect x="237" y="93" width="2" height="16" fill="rgba(100,200,255,0.9)" rx="1"/>

  <!-- Result cards -->
  <rect x="60" y="140" width="280" height="38" rx="8" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="70" y="148" width="8" height="8" rx="1" fill="rgba(100,200,255,0.7)"/>
  <text x="86" y="157" font-family="'DM Sans', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">IEEE Xplore · Research Paper</text>
  <text x="86" y="170" font-family="'DM Sans', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">scholar.google.com</text>

  <rect x="60" y="185" width="280" height="38" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="70" y="193" width="8" height="8" rx="1" fill="rgba(80,180,255,0.5)"/>
  <text x="86" y="202" font-family="'DM Sans', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Semantic Scholar · 2024</text>
  <text x="86" y="215" font-family="'DM Sans', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">semanticscholar.org</text>

  <rect x="60" y="230" width="280" height="38" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="70" y="238" width="8" height="8" rx="1" fill="rgba(60,160,255,0.35)"/>
  <text x="86" y="247" font-family="'DM Sans', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">ResearchGate · Journal</text>
  <text x="86" y="260" font-family="'DM Sans', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.22)">researchgate.net</text>

  <!-- Book + magnifier illustration right -->
  <!-- Book stack -->
  <rect x="400" y="160" width="90" height="12" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="408" y="148" width="90" height="12" rx="3" fill="rgba(100,180,255,0.25)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="416" y="136" width="90" height="12" rx="3" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Spine lines -->
  <line x1="420" y1="136" x2="420" y2="148" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="428" y1="148" x2="428" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Big magnifier -->
  <circle cx="450" cy="95" r="38" fill="none" stroke="rgba(100,200,255,0.5)" stroke-width="3"/>
  <circle cx="450" cy="95" r="30" fill="rgba(26,108,255,0.12)"/>
  <!-- Star/spark inside -->
  <text x="435" y="101" font-family="serif" font-size="22" fill="rgba(255,255,255,0.7)">✦</text>
  <line x1="476" y1="121" x2="502" y2="147" stroke="rgba(100,200,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="498" y1="143" x2="512" y2="157" stroke="rgba(100,200,255,0.8)" stroke-width="5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="30" y="268" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">TUẦN 02</text>
  <text x="30" y="288" font-family="'DM Sans', Arial, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="1">Tìm kiếm &amp; đánh giá thông tin</text>
</svg>
