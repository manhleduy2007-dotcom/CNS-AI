<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061540"/>
      <stop offset="100%" style="stop-color:#1550cc"/>
    </linearGradient>
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60d0ff"/>
      <stop offset="100%" style="stop-color:#1a6cff"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#60b0ff"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow5"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="soft5"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="600" height="300" fill="url(#bg5)"/>

  <!-- Subtle grid -->
  <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="600" height="300" fill="url(#grid5)"/>

  <!-- Glow blobs -->
  <ellipse cx="180" cy="140" rx="160" ry="120" fill="rgba(100,150,255,0.18)" filter="url(#glow5)"/>
  <ellipse cx="460" cy="120" rx="120" ry="100" fill="rgba(160,120,255,0.15)" filter="url(#glow5)"/>

  <!-- AI "brain" circle center-right -->
  <circle cx="420" cy="130" r="58" fill="rgba(26,108,255,0.15)" stroke="rgba(100,190,255,0.3)" stroke-width="1.5"/>
  <circle cx="420" cy="130" r="42" fill="rgba(26,108,255,0.12)" stroke="rgba(100,190,255,0.2)" stroke-width="1"/>
  <!-- Brain icon paths (simplified) -->
  <path d="M400 118 Q395 108 405 104 Q415 100 418 110 Q425 100 435 104 Q445 108 440 118 Q448 118 450 126 Q452 134 444 138 Q446 148 438 150 Q430 152 424 144 Q418 152 410 150 Q402 148 404 138 Q396 134 398 126 Q400 118 400 118Z" fill="none" stroke="rgba(150,210,255,0.7)" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Neural sparks from brain -->
  <line x1="448" y1="108" x2="468" y2="95" stroke="rgba(100,200,255,0.5)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="452" y1="130" x2="476" y2="128" stroke="rgba(100,200,255,0.4)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="444" y1="150" x2="462" y2="162" stroke="rgba(100,200,255,0.4)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="396" y1="108" x2="376" y2="95" stroke="rgba(160,130,255,0.5)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="390" y1="130" x2="366" y2="126" stroke="rgba(160,130,255,0.4)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Creative outputs floating around brain -->
  <!-- Text/writing card -->
  <rect x="60" y="55" width="130" height="80" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <rect x="74" y="70" width="100" height="7" rx="3.5" fill="rgba(255,255,255,0.55)"/>
  <rect x="74" y="84" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="74" y="96" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="74" y="108" width="65" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Pen icon top-right of card -->
  <path d="M173 62 L180 55 L186 61 L179 68Z" fill="rgba(100,200,255,0.7)"/>
  <line x1="173" y1="62" x2="169" y2="66" stroke="rgba(100,200,255,0.5)" stroke-width="1.5"/>

  <!-- Image/art card -->
  <rect x="60" y="152" width="130" height="80" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <!-- Mini "generated image" inside -->
  <circle cx="90" cy="178" r="8" fill="rgba(255,220,80,0.35)"/>
  <polygon points="68,222 95,185 122,210 145,192 190,232 68,232" fill="rgba(100,180,255,0.2)" clip-path="inset(0 0 0 0 round 0 0 10px 10px)"/>
  <rect x="60" y="152" width="130" height="80" rx="10" fill="none" stroke="rgba(160,130,255,0.3)" stroke-width="1.2"/>
  <!-- Image icon badge -->
  <rect x="148" y="148" width="26" height="20" rx="5" fill="rgba(160,130,255,0.4)" stroke="rgba(160,130,255,0.6)" stroke-width="1"/>
  <text x="153" y="162" font-family="sans-serif" font-size="11" fill="white">🎨</text>

  <!-- Code card -->
  <rect x="210" y="55" width="150" height="75" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(100,255,180,0.25)" stroke-width="1.2"/>
  <text x="224" y="76" font-family="monospace" font-size="10" fill="rgba(100,255,180,0.8)">// AI-generated</text>
  <text x="224" y="91" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">function create() {</text>
  <text x="224" y="106" font-family="monospace" font-size="10" fill="rgba(160,200,255,0.6)">  return magic;</text>
  <text x="224" y="120" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">}</text>

  <!-- Connecting arrows from brain to outputs -->
  <path d="M366 118 Q320 100 252 100" fill="none" stroke="rgba(100,200,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M364 140 Q300 140 190 168" fill="none" stroke="rgba(160,130,255,0.22)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Rainbow spark streak top -->
  <rect x="60" y="30" width="480" height="4" rx="2" fill="url(#sparkGrad)" opacity="0.4"/>
  <rect x="60" y="30" width="480" height="4" rx="2" fill="url(#sparkGrad)" opacity="0.3" filter="url(#soft5)"/>

  <!-- Floating sparkles -->
  <text x="310" y="48" font-family="serif" font-size="14" fill="rgba(255,220,100,0.6)">✦</text>
  <text x="540" y="200" font-family="serif" font-size="10" fill="rgba(160,130,255,0.5)">✦</text>
  <text x="200" y="240" font-family="serif" font-size="8" fill="rgba(100,220,255,0.4)">✦</text>

  <!-- Label -->
  <text x="30" y="268" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="3">TUẦN 05</text>
  <text x="30" y="288" font-family="'DM Sans', Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="0.5">Sử dụng AI hỗ trợ sáng tạo nội dung</text>
</svg>
